name: Update IPTV Playlist

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history to avoid conflicts
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - run: pip install requests
      
      - run: python run.py
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add master_playlist.m3u README.md
          git diff --staged --quiet || git commit -m "Auto-update"
          git push --force  # Force push to avoid conflicts
