name: Update Tamil & English IPTV Playlist

on:
  schedule:
    - cron: '0 */3 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Create Python script
        run: |
          cat > run.py << 'PYEOF'
          import requests, re, time
          from collections import OrderedDict

          OUTPUT_FILE = "master_playlist.m3u"
          CATEGORIES = [
              "Tamil Local Channels", "Tamil Movies", "Tamil News", "Tamil Music",
              "Tamil Kids", "English Movies", "English News", "Sports"
          ]
          SKIP_URL_CHECK = {"Tamil Local Channels"}

          SOURCES = [
              "https://raw.githubusercontent.com/Vmfm/tamilvmtv/main/live/channels.m3u",
              "https://raw.githubusercontent.com/Vmfm/tamilvmtv/main/live/jio.m3u",
              "https://raw.githubusercontent.com/Tamilwebcast/Tamilwebcast.github.io/main/TWCIPTV.m3u",
              "https://raw.githubusercontent.com/PraveenBojja83/praveentv/main/resource/channels.json",
              "https://raw.githubusercontent.com/Indiblog/india-iptv/main/output/india_iptv.m3u",
              "https://raw.githubusercontent.com/Indiblog/india-iptv/main/output/india_general.m3u",
              "https://raw.githubusercontent.com/amazeyourself/m3u/main/jtv.m3u",
              "https://raw.githubusercontent.com/amazeyourself/m3u/main/pishow.m3u",
              "https://raw.githubusercontent.com/amazeyourself/m3u/main/yupptvfast.m3u",
              "https://raw.githubusercontent.com/amazeyourself/m3u/main/tangotv.m3u",
              "https://raw.githubusercontent.com/amazeyourself/m3u/main/ashokadigital.m3u",
              "https://raw.githubusercontent.com/amazeyourself/m3u/main/neotv.m3u"
          ]

          LANG_KW = {
              "tamil": ["tamil", "sun ", "vijay", "kalaignar", "jaya ", "raj ", "captain",
                        "polimer", "mega ", "pudhiya", "thanthi", "vasanth", "isaiaruvi",
                        "k tv", "ktv", "adithya", "chutti", "chithiram", "makkal", "sirippoli",
                        "vendhar", "peppers", "angel", "murugan", "madha", "velicham", "seithigal"],
              "english": ["english", "hbo", "cnn", "bbc", "disney", "discovery", "nat geo",
                          "sony pix", "star movies", "mn+", "hits", "romedy", "comedy central",
                          "axn", "colors infinity", "zee café", "&flix", "&privé", "star world",
                          "fox", "fyi", "tlc", "animal planet", "history tv18", "news", "bloomberg"]
          }
          SPORTS_KW = ["sports", "star sports", "sony ten", "eurosport", "dsport",
                       "olympics", "cricket", "football", "tennis", "f1", "nba", "wwe"]

          MANUAL_MAP = {
              "Sun TV": "Tamil Local Channels", "Sun Music": "Tamil Music", "KTV": "Tamil Movies",
              "Sun News": "Tamil News", "Chutti TV": "Tamil Kids", "Star Movies": "English Movies",
              "CNN": "English News", "Star Sports": "Sports"
          }

          def clean_name(raw):
              raw = re.sub(r'\s*\[.*?\]\s*', '', raw)
              raw = re.sub(r'\s*\(.*?\)\s*', '', raw)
              raw = re.sub(r'\s*\b(HD|SD|HEVC|4K|UHD)\b\s*', '', raw, flags=re.I)
              return ' '.join(raw.split()).strip()

          def detect_lang(name):
              n = name.lower()
              for kw in LANG_KW["tamil"]:
                  if kw in n: return "tamil"
              for kw in LANG_KW["english"]:
                  if kw in n: return "english"
              return None

          def is_sports(name):
              return any(kw in name.lower() for kw in SPORTS_KW)

          def detect_cat(name):
              for key, cat in MANUAL_MAP.items():
                  if key.lower() in name.lower(): return cat
              n = name.lower()
              lang = detect_lang(name)

              if any(w in n for w in ["kids", "chutti", "chithiram", "cartoon", "disney",
                                      "nick", "pogo", "motu patlu", "chhota bheem",
                                      "scooby", "mr bean", "vir the robot"]):
                  return "Tamil Kids"

              if is_sports(name) and lang in ("tamil", "english"):
                  return "Sports"

              if lang == "tamil":
                  if any(w in n for w in ["movie", "cinema", "ktv", "megahit", "thirai"]): return "Tamil Movies"
                  if any(w in n for w in ["news", "seithigal", "pudhiya", "polimer news",
                                          "sun news", "thanthi tv", "news18"]): return "Tamil News"
                  if any(w in n for w in ["music", "isai", "isaiaruvi", "sun music", "mega music"]): return "Tamil Music"
                  return "Tamil Local Channels"

              if lang == "english":
                  if any(w in n for w in ["news", "cnn", "bbc", "ndtv", "times now", "republic",
                                          "wion", "sky news"]): return "English News"
                  if any(w in n for w in ["movie", "hbo", "star movies", "sony pix", "mn+",
                                          "hits", "romedy", "comedy central", "&flix", "zee café"]): return "English Movies"
                  return "English Movies"

              return None

          def check_url(url, timeout=3):
              try:
                  r = requests.head(url, timeout=timeout, allow_redirects=True)
                  return r.status_code == 200
              except:
                  return False

          def parse_m3u(content):
              lines = content.splitlines()
              attrs = {}
              name = None
              for line in lines:
                  line = line.strip()
                  if line.startswith("#EXTINF"):
                      attrs = {}
                      for match in re.finditer(r'(\S+)="(.*?)"', line):
                          attrs[match.group(1)] = match.group(2)
                      if ',' in line:
                          name = line.rsplit(',', 1)[-1].strip()
                      else:
                          name = None
                  elif line and not line.startswith("#") and name:
                      yield attrs, name, line
                      name = None

          def main():
              channels = {cat: OrderedDict() for cat in CATEGORIES}
              seen_urls = set()

              for src in SOURCES:
                  print(f"Fetching {src} ... ", end="")
                  try:
                      resp = requests.get(src, timeout=15)
                      resp.raise_for_status()
                      print("OK")
                  except Exception as e:
                      print(f"FAIL ({e})")
                      continue

                  for attrs, raw_name, url in parse_m3u(resp.text):
                      url = url.strip()
                      if not url.startswith("http"):
                          continue
                      if url in seen_urls:
                          continue
                      seen_urls.add(url)

                      name = clean_name(raw_name)
                      if not name:
                          continue

                      category = detect_cat(name)
                      if category is None:
                          continue

                      if category not in SKIP_URL_CHECK:
                          if not check_url(url):
                              print(f"  ✗ Dead: {name} ({category})")
                              continue

                      new_attrs = dict(attrs)
                      new_attrs["group-title"] = category
                      channels[category][url] = (new_attrs, raw_name)
                      print(f"  ✓ {raw_name} → {category}")

              with open(OUTPUT_FILE, "w", encoding="utf-8") as f:
                  f.write("#EXTM3U\n")
                  for cat in CATEGORIES:
                      f.write(f"\n# --- {cat} ---\n")
                      for url, (attrs, ch_name) in channels[cat].items():
                          extinf = '#EXTINF:-1'
                          for k, v in attrs.items():
                              extinf += f' {k}="{v}"'
                          extinf += f',{ch_name}'
                          f.write(extinf + '\n')
                          f.write(url + '\n')

              total = sum(len(v) for v in channels.values())
              print(f"\n✅ Done. Total: {total}")
              for cat in CATEGORIES:
                  print(f"  {cat}: {len(channels[cat])}")

              with open("README.md", "w", encoding="utf-8") as f:
                  f.write("# 📺 Tamil & English IPTV\n\n")
                  f.write(f"**Updated:** {time.strftime('%Y-%m-%d %H:%M:%S UTC', time.gmtime())}\n\n")
                  f.write(f"**Total:** {total}\n\n")
                  f.write("| Category | Channels |\n| --- | --- |\n")
                  for cat in CATEGORIES:
                      f.write(f"| {cat} | {len(channels[cat])} |\n")
                  f.write("\n## 📺 Playlist URL\n")
                  f.write("```\n")
                  f.write("https://raw.githubusercontent.com/nuttle-nuttterr/Mk-tholaikaatchi-test/main/master_playlist.m3u\n")
                  f.write("```\n")

          if __name__ == "__main__":
              main()
          PYEOF

      - name: Run playlist generator
        run: python run.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add master_playlist.m3u README.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔄 Auto-update playlist $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi            REPO=$(echo "$line" | cut -d'/' -f2)
            FILE_PATH=$(echo "$line" | cut -d'/' -f3-)
            
            API_URL="https://api.github.com/repos/$OWNER/$REPO/contents/$FILE_PATH"
            RESPONSE=$(curl -s "$API_URL")
            
            if ! echo "$RESPONSE" | jq empty 2>/dev/null; then
              continue
            fi
            
            DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.download_url // "none"')
            [[ "$DOWNLOAD_URL" == "none" ]] && continue
            
            curl -s -L "$DOWNLOAD_URL" > temp_file.txt
            
            # Handle EPG
            if [[ "$FILE_PATH" == *.xml ]] || [[ "$FILE_PATH" == *.xml.gz ]]; then
              if [[ "$FILE_PATH" == *.gz ]]; then
                gunzip -c temp_file.txt > temp_epg.xml 2>/dev/null || continue
              else
                mv temp_file.txt temp_epg.xml
              fi
              sed -n '/<tv/,/<\/tv>/p' temp_epg.xml | sed '/<?xml/d' | sed '1d;$d' >> master_epg.xml
              continue
            fi
            
            # Convert JSON
            if [[ "$FILE_PATH" == *.json ]]; then
              printf '%s\n' \
                'def process_item:' \
                '  "#EXTINF:-1, " + (.name // "Unknown") + "\n" + (.url // "");' \
                'def get_items:' \
                '  if type == "array" then .' \
                '  elif .streams then .streams' \
                '  elif .channels then .channels' \
                '  elif .data then .data' \
                '  else [] end;' \
                'get_items | .[] | process_item' > script.jq
              jq -r -f script.jq temp_file.txt > converted.m3u
            else
              cp temp_file.txt converted.m3u
            fi
            
            # Process and categorize with PROPER group-title
            awk '
            BEGIN {
                extinf = ""
                category = ""
            }
            /^#EXTINF:/ {
                extinf = $0
                lower_extinf = tolower($0)
                
                # Determine category from EXTINF
                if (lower_extinf ~ /tamil.*local|local.*tamil/) {
                    category = "Tamil Local Channels"
                }
                else if (lower_extinf ~ /tamil/ && lower_extinf ~ /movie|cinema|film|j movie|k tv|raj digital|zee thirai|jaya movie|premium|24x7/) {
                    category = "Tamil Movies"
                }
                else if (lower_extinf ~ /tamil/ && lower_extinf ~ /news|thanthi|polimer news|raj news|kalaignar news|news j|news7|news18|win news|puthiya|sathiyam|madhimugam/) {
                    category = "Tamil News"
                }
                else if (lower_extinf ~ /tamil/ && lower_extinf ~ /music|musix|isaiaruvi|sun music|raj musix|g music|jcv musix|jp music/) {
                    category = "Tamil Music"
                }
                else if (lower_extinf ~ /kids|chutti|cartoon|nick|pogo|sonic|discovery kids|chhota|motu|scooby|vir the robot/) {
                    category = "Tamil Kids"
                }
                else if (lower_extinf ~ /english/ && lower_extinf ~ /movie|cinema|film/) {
                    category = "English Movies"
                }
                else if (lower_extinf ~ /english/ && lower_extinf ~ /news/) {
                    category = "English News"
                }
                else if (lower_extinf ~ /sport|cricket|football|tennis/) {
                    category = "Sports"
                }
                else if (lower_extinf ~ /tamil/) {
                    category = "Tamil Movies"
                }
                else {
                    category = "skip"
                }
                next
            }
            {
                line = $0
                gsub(/^[ \t\r]+/, "", line)
                if (line == "") next
                
                if (line ~ /^(https?|rtmp|mms|udp|rtp):\/\//) {
                    lower_url = tolower(line)
                    
                    # Check URL for local providers
                    if (lower_url ~ /galaxyott|sscloud|applelive|ipcloud|onecloudlive|bmlive|phoenixcreations|singamcloud|olidigital|tamilstream|rojatv|maxtn|notvstream|apserver|rcserver|brightmeltech|mindspell|7starcloud|livebox|yuppcdn|tangotv|dailyhunt|pishow|streamjo|massstream|tatatv|ranapk|ashokadigital|103\.140\.254|103\.87\.105|198\.144\.149/) {
                        category = "Tamil Local Channels"
                    }
                    
                    if (extinf != "" && category != "skip") {
                        # Remove old group-title and add new one
                        gsub(/group-title="[^"]*"/, "", extinf)
                        # Insert group-title before the channel name (after the comma)
                        if (match(extinf, /,[^,]*$/)) {
                            before = substr(extinf, 1, RSTART)
                            after = substr(extinf, RSTART + 1)
                            extinf = before " group-title=\"" category "\"," after
                        }
                        
                        print extinf
                        print line
                        extinf = ""
                        category = ""
                    }
                } else {
                    extinf = ""
                    category = ""
                }
            }' converted.m3u >> master_playlist.m3u
            
            echo "✅ Categorized"
            sleep 1
          done < sources.txt
          
          echo '</tv>' >> master_epg.xml
          
          echo ""
          echo "=========================================="
          echo "📺 ADDING GLOBAL PLAYLISTS"
          echo "=========================================="
          
          # Add global Tamil with proper categories
          curl -s "https://iptv-org.github.io/iptv/languages/tam.m3u" | awk '
          /^#EXTINF:/ {
              extinf = $0
              lower = tolower($0)
              if (lower ~ /movie|cinema|film/) category = "Tamil Movies"
              else if (lower ~ /news/) category = "Tamil News"
              else if (lower ~ /music/) category = "Tamil Music"
              else if (lower ~ /kids|cartoon/) category = "Tamil Kids"
              else category = "Tamil Movies"
              next
          }
          {
              line = $0
              gsub(/^[ \t\r]+/, "", line)
              if (line == "") next
              if (line ~ /^(https?|rtmp|mms|udp|rtp):\/\//) {
                  if (extinf != "") {
                      gsub(/group-title="[^"]*"/, "", extinf)
                      if (match(extinf, /,[^,]*$/)) {
                          before = substr(extinf, 1, RSTART)
                          after = substr(extinf, RSTART + 1)
                          extinf = before " group-title=\"" category "\"," after
                      }
                      print extinf
                      print line
                      extinf = ""
                  }
              }
          }' >> master_playlist.m3u
          
          # Add global English (only news/sports/movies)
          curl -s "https://iptv-org.github.io/iptv/languages/eng.m3u" | awk '
          /^#EXTINF:/ {
              extinf = $0
              lower = tolower($0)
              if (lower ~ /movie|cinema|film/) category = "English Movies"
              else if (lower ~ /news/) category = "English News"
              else if (lower ~ /sport/) category = "Sports"
              else category = "skip"
              next
          }
          {
              line = $0
              gsub(/^[ \t\r]+/, "", line)
              if (line == "") next
              if (line ~ /^(https?|rtmp|mms|udp|rtp):\/\//) {
                  if (extinf != "" && category != "skip") {
                      gsub(/group-title="[^"]*"/, "", extinf)
                      if (match(extinf, /,[^,]*$/)) {
                          before = substr(extinf, 1, RSTART)
                          after = substr(extinf, RSTART + 1)
                          extinf = before " group-title=\"" category "\"," after
                      }
                      print extinf
                      print line
                      extinf = ""
                  }
              }
          }' >> master_playlist.m3u
          
          echo ""
          echo "=========================================="
          echo "🧹 DEDUPLICATING"
          echo "=========================================="
          
          # Deduplicate
          awk '
          /^#EXTINF:/ { extinf = $0; next }
          {
              line = $0
              gsub(/^[ \t\r]+/, "", line)
              if (line == "") next
              if (line ~ /^(https?|rtmp|mms|udp|rtp):\/\//) {
                  if (extinf != "") {
                      if (!seen[line]++) {
                          print extinf
                          print line
                      }
                      extinf = ""
                  }
              }
          }' master_playlist.m3u > final.m3u
          
          echo '#EXTM3U' > master_playlist.m3u
          cat final.m3u >> master_playlist.m3u
          
          dos2unix master_playlist.m3u master_epg.xml 2>/dev/null || true
          
          echo ""
          echo "=========================================="
          echo "📊 FINAL STATISTICS"
          echo "=========================================="
          TOTAL=$(grep -c '^#EXTINF:' master_playlist.m3u)
          echo "🎉 TOTAL CHANNELS: $TOTAL"
          echo ""
          echo "📁 Categories:"
          grep -o 'group-title="[^"]*"' master_playlist.m3u | sort | uniq -c | sort -rn
          
          echo ""
          echo "=========================================="
          echo "✅ BUILD COMPLETE"
          echo "=========================================="
          
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add master_playlist.m3u master_epg.xml
          git diff --staged --quiet || git commit -m "Final: Proper categories with group-title"
          git push --force || true
