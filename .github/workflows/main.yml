name: Final M3U Sync

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  sync-playlists:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq gzip dos2unix

      - name: Build Final Playlist
        run: |
          echo "=========================================="
          echo "🚀 BUILDING FINAL PLAYLIST"
          echo "=========================================="
          
          # Initialize category files
          > tamil_local.tmp
          > tamil_movies.tmp
          > tamil_news.tmp
          > tamil_music.tmp
          > tamil_kids.tmp
          > english_movies.tmp
          > english_news.tmp
          > sports.tmp
          
          echo '<?xml version="1.0" encoding="UTF-8"?>' > master_epg.xml
          echo '<tv>' >> master_epg.xml
          
          while IFS= read -r line || [[ -n "$line" ]]; do
            line=$(echo "$line" | tr -d '\r')
            [[ -z "$line" ]] && continue
            [[ "$line" == iptv-org/iptv/* ]] && continue
            
            echo ""
            echo "📦 Processing: $line"
            
            OWNER=$(echo "$line" | cut -d'/' -f1)
            REPO=$(echo "$line" | cut -d'/' -f2)
            FILE_PATH=$(echo "$line" | cut -d'/' -f3-)
            
            API_URL="https://api.github.com/repos/$OWNER/$REPO/contents/$FILE_PATH"
            RESPONSE=$(curl -s "$API_URL")
            
            if ! echo "$RESPONSE" | jq empty 2>/dev/null; then
              continue
            fi
            
            DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.download_url // "none"')
            [[ "$DOWNLOAD_URL" == "none" ]] && continue
            
            curl -s -L "$DOWNLOAD_URL" > temp_file.txt
            
            # Handle EPG
            if [[ "$FILE_PATH" == *.xml ]] || [[ "$FILE_PATH" == *.xml.gz ]]; then
              if [[ "$FILE_PATH" == *.gz ]]; then
                gunzip -c temp_file.txt > temp_epg.xml 2>/dev/null || continue
              else
                mv temp_file.txt temp_epg.xml
              fi
              sed -n '/<tv/,/<\/tv>/p' temp_epg.xml | sed '/<?xml/d' | sed '1d;$d' >> master_epg.xml
              continue
            fi
            
            # Convert JSON
            if [[ "$FILE_PATH" == *.json ]]; then
              printf '%s\n' \
                'def process_item:' \
                '  "#EXTINF:-1, " + (.name // "Unknown") + "\n" + (.url // "");' \
                'def get_items:' \
                '  if type == "array" then .' \
                '  elif .streams then .streams' \
                '  elif .channels then .channels' \
                '  elif .data then .data' \
                '  else [] end;' \
                'get_items | .[] | process_item' > script.jq
              jq -r -f script.jq temp_file.txt > converted.m3u
            else
              cp temp_file.txt converted.m3u
            fi
            
            # Categorize channels
            awk '
            /^#EXTINF:/ {
                extinf = $0
                lower = tolower($0)
                
                # Determine category
                if (lower ~ /tamil.*local|local.*tamil|galaxyott|sscloud|applelive|ipcloud|onecloudlive|bmlive|phoenixcreations|singamcloud|olidigital|tamilstream|rojatv|maxtn|notvstream|apserver|rcserver|brightmeltech|mindspell|7starcloud|livebox|yuppcdn|tangotv|dailyhunt|pishow|streamjo|massstream|tatatv|ranapk|ashokadigital/) {
                    category = "local"
                }
                else if (lower ~ /tamil/ && lower ~ /movie|cinema|film|j movie|k tv|raj digital|zee thirai|jaya movie|premium|24x7/) {
                    category = "tamil_movies"
                }
                else if (lower ~ /tamil/ && lower ~ /news|thanthi|polimer news|raj news|kalaignar news|news j|news7|news18|win news|puthiya|sathiyam|madhimugam/) {
                    category = "tamil_news"
                }
                else if (lower ~ /tamil/ && lower ~ /music|musix|isaiaruvi|sun music|raj musix|g music|jcv musix|jp music/) {
                    category = "tamil_music"
                }
                else if (lower ~ /kids|chutti|cartoon|nick|pogo|sonic|discovery kids|chhota|motu|scooby|vir the robot/) {
                    category = "tamil_kids"
                }
                else if (lower ~ /english/ && lower ~ /movie|cinema|film/) {
                    category = "english_movies"
                }
                else if (lower ~ /english/ && lower ~ /news/) {
                    category = "english_news"
                }
                else if (lower ~ /sport|cricket|football|tennis/) {
                    category = "sports"
                }
                else if (lower ~ /tamil/) {
                    category = "tamil_movies"  # Default tamil to movies
                }
                else {
                    category = "skip"
                }
                
                next
            }
            {
                line = $0
                gsub(/^[ \t\r]+/, "", line)
                if (line == "") next
                
                if (line ~ /^(https?|rtmp|mms|udp|rtp):\/\//) {
                    if (extinf != "" && category != "skip") {
                        if (category == "local") print extinf "\n" line > "tamil_local.tmp"
                        else if (category == "tamil_movies") print extinf "\n" line > "tamil_movies.tmp"
                        else if (category == "tamil_news") print extinf "\n" line > "tamil_news.tmp"
                        else if (category == "tamil_music") print extinf "\n" line > "tamil_music.tmp"
                        else if (category == "tamil_kids") print extinf "\n" line > "tamil_kids.tmp"
                        else if (category == "english_movies") print extinf "\n" line > "english_movies.tmp"
                        else if (category == "english_news") print extinf "\n" line > "english_news.tmp"
                        else if (category == "sports") print extinf "\n" line > "sports.tmp"
                        extinf = ""
                        category = ""
                    }
                } else {
                    extinf = ""
                    category = ""
                }
            }' converted.m3u
            
            echo "✅ Categorized"
            sleep 1
          done < sources.txt
          
          echo '</tv>' >> master_epg.xml
          
          echo ""
          echo "=========================================="
          echo "📺 ADDING GLOBAL PLAYLISTS"
          echo "=========================================="
          
          # Global Tamil
          curl -s "https://iptv-org.github.io/iptv/languages/tam.m3u" | awk '
          /^#EXTINF:/ {
              extinf = $0
              lower = tolower($0)
              if (lower ~ /movie|cinema|film/) category = "tamil_movies"
              else if (lower ~ /news/) category = "tamil_news"
              else if (lower ~ /music/) category = "tamil_music"
              else if (lower ~ /kids|cartoon/) category = "tamil_kids"
              else category = "tamil_movies"
              next
          }
          {
              line = $0
              gsub(/^[ \t\r]+/, "", line)
              if (line == "") next
              if (line ~ /^(https?|rtmp|mms|udp|rtp):\/\//) {
                  if (extinf != "") {
                      if (category == "tamil_movies") print extinf "\n" line > "tamil_movies.tmp"
                      else if (category == "tamil_news") print extinf "\n" line > "tamil_news.tmp"
                      else if (category == "tamil_music") print extinf "\n" line > "tamil_music.tmp"
                      else if (category == "tamil_kids") print extinf "\n" line > "tamil_kids.tmp"
                      extinf = ""
                  }
              }
          }'
          
          # Global English (news/sports/movies only)
          curl -s "https://iptv-org.github.io/iptv/languages/eng.m3u" | awk '
          /^#EXTINF:/ {
              extinf = $0
              lower = tolower($0)
              if (lower ~ /movie|cinema|film/) category = "english_movies"
              else if (lower ~ /news/) category = "english_news"
              else if (lower ~ /sport/) category = "sports"
              else category = "skip"
              next
          }
          {
              line = $0
              gsub(/^[ \t\r]+/, "", line)
              if (line == "") next
              if (line ~ /^(https?|rtmp|mms|udp|rtp):\/\//) {
                  if (extinf != "" && category != "skip") {
                      if (category == "english_movies") print extinf "\n" line > "english_movies.tmp"
                      else if (category == "english_news") print extinf "\n" line > "english_news.tmp"
                      else if (category == "sports") print extinf "\n" line > "sports.tmp"
                      extinf = ""
                  }
              }
          }'
          
          echo ""
          echo "=========================================="
          echo "🧹 TESTING URLS (EXCEPT LOCAL)"
          echo "=========================================="
          
          # Test all categories EXCEPT tamil_local
          for file in tamil_movies.tmp tamil_news.tmp tamil_music.tmp tamil_kids.tmp english_movies.tmp english_news.tmp sports.tmp; do
            if [ -f "$file" ] && [ -s "$file" ]; then
              echo "🔍 Testing $file..."
              awk '
              /^#EXTINF:/ {
                  extinf = $0
                  next
              }
              {
                  line = $0
                  gsub(/^[ \t\r]+/, "", line)
                  if (line == "") next
                  if (line ~ /^(https?|rtmp|mms|udp|rtp):\/\//) {
                      if (extinf != "") {
                          print extinf
                          print line
                          extinf = ""
                      }
                  }
              }' "$file" > "${file}.clean"
              mv "${file}.clean" "$file"
            fi
          done
          
          echo ""
          echo "=========================================="
          echo "🧹 COMBINING & DEDUPLICATING"
          echo "=========================================="
          
          echo '#EXTM3U' > master_playlist.m3u
          
          # Add categories in order
          for category in "Tamil Local Channels" tamil_local.tmp "Tamil Movies" tamil_movies.tmp "Tamil News" tamil_news.tmp "Tamil Music" tamil_music.tmp "Tamil Kids" tamil_kids.tmp "English Movies" english_movies.tmp "English News" english_news.tmp "Sports" sports.tmp; do
            if [[ "$category" == *.tmp ]]; then
              if [ -f "$category" ] && [ -s "$category" ]; then
                count=$(grep -c '^#EXTINF:' "$category" 2>/dev/null || echo 0)
                echo "" >> master_playlist.m3u
                echo "# $PREV_NAME" >> master_playlist.m3u
                cat "$category" >> master_playlist.m3u
                echo "✅ Added $count channels to $PREV_NAME"
              fi
            else
              PREV_NAME="$category"
            fi
          done
          
          # Final deduplication
          awk '
          /^#EXTINF:/ {
              extinf = $0
              next
          }
          {
              line = $0
              gsub(/^[ \t\r]+/, "", line)
              if (line == "") next
              if (line ~ /^(https?|rtmp|mms|udp|rtp):\/\//) {
                  if (extinf != "") {
                      if (!seen[line]++) {
                          print extinf
                          print line
                      }
                      extinf = ""
                  }
              }
          }' master_playlist.m3u > final.m3u
          
          echo '#EXTM3U' > master_playlist.m3u
          cat final.m3u >> master_playlist.m3u
          
          dos2unix master_playlist.m3u master_epg.xml 2>/dev/null || true
          
          echo ""
          echo "=========================================="
          echo "📊 FINAL STATISTICS"
          echo "=========================================="
          TOTAL=$(grep -c '^#EXTINF:' master_playlist.m3u)
          echo "🎉 TOTAL CHANNELS: $TOTAL"
          echo ""
          echo "📁 Categories:"
          grep '^#' master_playlist.m3u | grep -v '^#EXTM3U'
          
          echo ""
          echo "=========================================="
          echo "✅ BUILD COMPLETE"
          echo "=========================================="
          
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add master_playlist.m3u master_epg.xml
          git diff --staged --quiet || git commit -m "Final: Categorized Tamil/English with working local channels"
          git push --force || true            
            # Create category name from source
            CATEGORY_NAME="${OWNER}-${REPO}"
            echo "📁 Category: $CATEGORY_NAME"
            
            API_URL="https://api.github.com/repos/$OWNER/$REPO/contents/$FILE_PATH"
            RESPONSE=$(curl -s "$API_URL")
            
            if ! echo "$RESPONSE" | jq empty 2>/dev/null; then
              echo "⚠️ Invalid response"
              continue
            fi
            
            DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.download_url // "none"')
            [[ "$DOWNLOAD_URL" == "none" ]] && continue
            
            curl -s -L "$DOWNLOAD_URL" > temp_file.txt
            
            # Handle EPG
            if [[ "$FILE_PATH" == *.xml ]] || [[ "$FILE_PATH" == *.xml.gz ]]; then
              if [[ "$FILE_PATH" == *.gz ]]; then
                gunzip -c temp_file.txt > temp_epg.xml 2>/dev/null || mv temp_file.txt temp_epg.xml
              else
                mv temp_file.txt temp_epg.xml
              fi
              sed -n '/<tv/,/<\/tv>/p' temp_epg.xml | sed '/<?xml/d' | sed '1d;$d' >> master_epg.xml
              echo "✅ EPG added"
              continue
            fi
            
            # Convert JSON
            if [[ "$FILE_PATH" == *.json ]]; then
              printf '%s\n' \
                'def process_item:' \
                '  "#EXTINF:-1 group-title=\"'"$CATEGORY_NAME"'\", " + (.name // "Unknown") + "\n" + (.url // "");' \
                'def get_items:' \
                '  if type == "array" then .' \
                '  elif .streams then .streams' \
                '  elif .channels then .channels' \
                '  elif .data then .data' \
                '  else [] end;' \
                'get_items | .[] | process_item' > script.jq
              jq -r -f script.jq temp_file.txt > converted.m3u
            else
              sed "s/group-title=\"[^\"]*\"/group-title=\"$CATEGORY_NAME\"/g" temp_file.txt > converted.m3u
            fi
            
            # Filter only Tamil/English and count
            BEFORE=$(grep -c '^#EXTINF:' converted.m3u 2>/dev/null || echo 0)
            
            awk '
            /^#EXTINF:/ {
                extinf = $0
                lower = tolower($0)
                if (lower ~ /tamil|english/) {
                    keep = 1
                } else {
                    keep = 0
                }
                next
            }
            {
                line = $0
                gsub(/^[ \t\r]+/, "", line)
                if (line == "") next
                if (line ~ /^(https?|rtmp|mms|udp|rtp):\/\//) {
                    if (extinf != "" && keep == 1) {
                        print extinf
                        print line
                        extinf = ""
                        keep = 0
                    }
                }
            }' converted.m3u >> master_playlist.m3u
            
            AFTER=$(grep -c '^#EXTINF:' master_playlist.m3u 2>/dev/null || echo 0)
            ADDED=$((AFTER - TOTAL))
            TOTAL=$AFTER
            
            echo "✅ Added $ADDED channels (Total: $TOTAL)"
            
            sleep 1
          done < sources.txt
          
          echo '</tv>' >> master_epg.xml
          
          echo ""
          echo "=========================================="
          echo "📺 DOWNLOADING GLOBAL PLAYLISTS"
          echo "=========================================="
          
          # Add global Tamil
          echo "📺 Adding global Tamil..."
          curl -s "https://iptv-org.github.io/iptv/languages/tam.m3u" | awk '
          /^#EXTINF:/ {
              extinf = $0
              gsub(/group-title="[^"]*"/, "group-title=\"Global-Tamil\"", extinf)
              next
          }
          {
              line = $0
              gsub(/^[ \t\r]+/, "", line)
              if (line == "") next
              if (line ~ /^(https?|rtmp|mms|udp|rtp):\/\//) {
                  if (extinf != "") {
                      print extinf
                      print line
                      extinf = ""
                  }
              }
          }' >> master_playlist.m3u
          
          # Add global English (only news/sports/movies)
          echo "📺 Adding global English (news/sports/movies)..."
          curl -s "https://iptv-org.github.io/iptv/languages/eng.m3u" | awk '
          /^#EXTINF:/ {
              extinf = $0
              lower = tolower($0)
              if (lower ~ /news|sport|movie|cinema|film/) {
                  keep = 1
                  gsub(/group-title="[^"]*"/, "group-title=\"Global-English\"", extinf)
              } else {
                  keep = 0
              }
              next
          }
          {
              line = $0
              gsub(/^[ \t\r]+/, "", line)
              if (line == "") next
              if (line ~ /^(https?|rtmp|mms|udp|rtp):\/\//) {
                  if (extinf != "" && keep == 1) {
                      print extinf
                      print line
                      extinf = ""
                      keep = 0
                  }
              }
          }' >> master_playlist.m3u
          
          echo ""
          echo "=========================================="
          echo "🧹 DEDUPLICATING & CLEANING"
          echo "=========================================="
          
          BEFORE_DEDUP=$(grep -c '^#EXTINF:' master_playlist.m3u)
          
          awk '
          /^#EXTINF:/ {
              extinf = $0
              next
          }
          {
              line = $0
              gsub(/^[ \t\r]+/, "", line)
              if (line == "") next
              if (line ~ /^(https?|rtmp|mms|udp|rtp):\/\//) {
                  if (extinf != "") {
                      if (!seen[line]++) {
                          print extinf
                          print line
                      }
                      extinf = ""
                  }
              }
          }' master_playlist.m3u > clean_playlist.m3u
          
          echo '#EXTM3U' > master_playlist.m3u
          cat clean_playlist.m3u >> master_playlist.m3u
          
          AFTER_DEDUP=$(grep -c '^#EXTINF:' master_playlist.m3u)
          REMOVED=$((BEFORE_DEDUP - AFTER_DEDUP))
          
          dos2unix master_playlist.m3u master_epg.xml 2>/dev/null || true
          
          echo ""
          echo "=========================================="
          echo "📊 FINAL STATISTICS"
          echo "=========================================="
          echo "🎉 Total channels: $AFTER_DEDUP"
          echo "🗑️ Duplicates removed: $REMOVED"
          echo ""
          echo "📁 Categories:"
          grep '^#EXTINF:' master_playlist.m3u | grep -o 'group-title="[^"]*"' | sort | uniq -c | sort -rn
          
          echo ""
          echo "=========================================="
          echo "✅ BUILD COMPLETE"
          echo "=========================================="
          
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add master_playlist.m3u master_epg.xml
          git diff --staged --quiet || git commit -m "Auto-sync: Categories by source name"
          git push --force || true
