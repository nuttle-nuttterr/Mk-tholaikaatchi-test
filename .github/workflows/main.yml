name: Final M3U Sync

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  sync-playlists:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq gzip dos2unix

      - name: Build Final Playlist
        run: |
          echo "=========================================="
          echo "🚀 BUILDING FINAL PLAYLIST"
          echo "=========================================="
          
          echo '#EXTM3U' > master_playlist.m3u
          echo '<?xml version="1.0" encoding="UTF-8"?>' > master_epg.xml
          echo '<tv>' >> master_epg.xml
          
          while IFS= read -r line || [[ -n "$line" ]]; do
            line=$(echo "$line" | tr -d '\r')
            [[ -z "$line" ]] && continue
            [[ "$line" == iptv-org/iptv/* ]] && continue
            
            echo ""
            echo "📦 Processing: $line"
            
            OWNER=$(echo "$line" | cut -d'/' -f1)
            REPO=$(echo "$line" | cut -d'/' -f2)
            FILE_PATH=$(echo "$line" | cut -d'/' -f3-)
            
            API_URL="https://api.github.com/repos/$OWNER/$REPO/contents/$FILE_PATH"
            RESPONSE=$(curl -s "$API_URL")
            
            if ! echo "$RESPONSE" | jq empty 2>/dev/null; then
              continue
            fi
            
            DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.download_url // "none"')
            [[ "$DOWNLOAD_URL" == "none" ]] && continue
            
            curl -s -L "$DOWNLOAD_URL" > temp_file.txt
            
            # Handle EPG
            if [[ "$FILE_PATH" == *.xml ]] || [[ "$FILE_PATH" == *.xml.gz ]]; then
              if [[ "$FILE_PATH" == *.gz ]]; then
                gunzip -c temp_file.txt > temp_epg.xml 2>/dev/null || continue
              else
                mv temp_file.txt temp_epg.xml
              fi
              sed -n '/<tv/,/<\/tv>/p' temp_epg.xml | sed '/<?xml/d' | sed '1d;$d' >> master_epg.xml
              continue
            fi
            
            # Convert JSON
            if [[ "$FILE_PATH" == *.json ]]; then
              printf '%s\n' \
                'def process_item:' \
                '  "#EXTINF:-1, " + (.name // "Unknown") + "\n" + (.url // "");' \
                'def get_items:' \
                '  if type == "array" then .' \
                '  elif .streams then .streams' \
                '  elif .channels then .channels' \
                '  elif .data then .data' \
                '  else [] end;' \
                'get_items | .[] | process_item' > script.jq
              jq -r -f script.jq temp_file.txt > converted.m3u
            else
              cp temp_file.txt converted.m3u
            fi
            
            # Process and categorize with PROPER group-title
            awk '
            BEGIN {
                extinf = ""
                category = ""
            }
            /^#EXTINF:/ {
                extinf = $0
                lower_extinf = tolower($0)
                
                # Determine category from EXTINF
                if (lower_extinf ~ /tamil.*local|local.*tamil/) {
                    category = "Tamil Local Channels"
                }
                else if (lower_extinf ~ /tamil/ && lower_extinf ~ /movie|cinema|film|j movie|k tv|raj digital|zee thirai|jaya movie|premium|24x7/) {
                    category = "Tamil Movies"
                }
                else if (lower_extinf ~ /tamil/ && lower_extinf ~ /news|thanthi|polimer news|raj news|kalaignar news|news j|news7|news18|win news|puthiya|sathiyam|madhimugam/) {
                    category = "Tamil News"
                }
                else if (lower_extinf ~ /tamil/ && lower_extinf ~ /music|musix|isaiaruvi|sun music|raj musix|g music|jcv musix|jp music/) {
                    category = "Tamil Music"
                }
                else if (lower_extinf ~ /kids|chutti|cartoon|nick|pogo|sonic|discovery kids|chhota|motu|scooby|vir the robot/) {
                    category = "Tamil Kids"
                }
                else if (lower_extinf ~ /english/ && lower_extinf ~ /movie|cinema|film/) {
                    category = "English Movies"
                }
                else if (lower_extinf ~ /english/ && lower_extinf ~ /news/) {
                    category = "English News"
                }
                else if (lower_extinf ~ /sport|cricket|football|tennis/) {
                    category = "Sports"
                }
                else if (lower_extinf ~ /tamil/) {
                    category = "Tamil Movies"
                }
                else {
                    category = "skip"
                }
                next
            }
            {
                line = $0
                gsub(/^[ \t\r]+/, "", line)
                if (line == "") next
                
                if (line ~ /^(https?|rtmp|mms|udp|rtp):\/\//) {
                    lower_url = tolower(line)
                    
                    # Check URL for local providers
                    if (lower_url ~ /galaxyott|sscloud|applelive|ipcloud|onecloudlive|bmlive|phoenixcreations|singamcloud|olidigital|tamilstream|rojatv|maxtn|notvstream|apserver|rcserver|brightmeltech|mindspell|7starcloud|livebox|yuppcdn|tangotv|dailyhunt|pishow|streamjo|massstream|tatatv|ranapk|ashokadigital|103\.140\.254|103\.87\.105|198\.144\.149/) {
                        category = "Tamil Local Channels"
                    }
                    
                    if (extinf != "" && category != "skip") {
                        # Remove old group-title and add new one
                        gsub(/group-title="[^"]*"/, "", extinf)
                        # Insert group-title before the channel name (after the comma)
                        if (match(extinf, /,[^,]*$/)) {
                            before = substr(extinf, 1, RSTART)
                            after = substr(extinf, RSTART + 1)
                            extinf = before " group-title=\"" category "\"," after
                        }
                        
                        print extinf
                        print line
                        extinf = ""
                        category = ""
                    }
                } else {
                    extinf = ""
                    category = ""
                }
            }' converted.m3u >> master_playlist.m3u
            
            echo "✅ Categorized"
            sleep 1
          done < sources.txt
          
          echo '</tv>' >> master_epg.xml
          
          echo ""
          echo "=========================================="
          echo "📺 ADDING GLOBAL PLAYLISTS"
          echo "=========================================="
          
          # Add global Tamil with proper categories
          curl -s "https://iptv-org.github.io/iptv/languages/tam.m3u" | awk '
          /^#EXTINF:/ {
              extinf = $0
              lower = tolower($0)
              if (lower ~ /movie|cinema|film/) category = "Tamil Movies"
              else if (lower ~ /news/) category = "Tamil News"
              else if (lower ~ /music/) category = "Tamil Music"
              else if (lower ~ /kids|cartoon/) category = "Tamil Kids"
              else category = "Tamil Movies"
              next
          }
          {
              line = $0
              gsub(/^[ \t\r]+/, "", line)
              if (line == "") next
              if (line ~ /^(https?|rtmp|mms|udp|rtp):\/\//) {
                  if (extinf != "") {
                      gsub(/group-title="[^"]*"/, "", extinf)
                      if (match(extinf, /,[^,]*$/)) {
                          before = substr(extinf, 1, RSTART)
                          after = substr(extinf, RSTART + 1)
                          extinf = before " group-title=\"" category "\"," after
                      }
                      print extinf
                      print line
                      extinf = ""
                  }
              }
          }' >> master_playlist.m3u
          
          # Add global English (only news/sports/movies)
          curl -s "https://iptv-org.github.io/iptv/languages/eng.m3u" | awk '
          /^#EXTINF:/ {
              extinf = $0
              lower = tolower($0)
              if (lower ~ /movie|cinema|film/) category = "English Movies"
              else if (lower ~ /news/) category = "English News"
              else if (lower ~ /sport/) category = "Sports"
              else category = "skip"
              next
          }
          {
              line = $0
              gsub(/^[ \t\r]+/, "", line)
              if (line == "") next
              if (line ~ /^(https?|rtmp|mms|udp|rtp):\/\//) {
                  if (extinf != "" && category != "skip") {
                      gsub(/group-title="[^"]*"/, "", extinf)
                      if (match(extinf, /,[^,]*$/)) {
                          before = substr(extinf, 1, RSTART)
                          after = substr(extinf, RSTART + 1)
                          extinf = before " group-title=\"" category "\"," after
                      }
                      print extinf
                      print line
                      extinf = ""
                  }
              }
          }' >> master_playlist.m3u
          
          echo ""
          echo "=========================================="
          echo "🧹 DEDUPLICATING"
          echo "=========================================="
          
          # Deduplicate
          awk '
          /^#EXTINF:/ { extinf = $0; next }
          {
              line = $0
              gsub(/^[ \t\r]+/, "", line)
              if (line == "") next
              if (line ~ /^(https?|rtmp|mms|udp|rtp):\/\//) {
                  if (extinf != "") {
                      if (!seen[line]++) {
                          print extinf
                          print line
                      }
                      extinf = ""
                  }
              }
          }' master_playlist.m3u > final.m3u
          
          echo '#EXTM3U' > master_playlist.m3u
          cat final.m3u >> master_playlist.m3u
          
          dos2unix master_playlist.m3u master_epg.xml 2>/dev/null || true
          
          echo ""
          echo "=========================================="
          echo "📊 FINAL STATISTICS"
          echo "=========================================="
          TOTAL=$(grep -c '^#EXTINF:' master_playlist.m3u)
          echo "🎉 TOTAL CHANNELS: $TOTAL"
          echo ""
          echo "📁 Categories:"
          grep -o 'group-title="[^"]*"' master_playlist.m3u | sort | uniq -c | sort -rn
          
          echo ""
          echo "=========================================="
          echo "✅ BUILD COMPLETE"
          echo "=========================================="
          
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add master_playlist.m3u master_epg.xml
          git diff --staged --quiet || git commit -m "Final: Proper categories with group-title"
          git push --force || true
