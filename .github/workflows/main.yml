name: Smart M3U + EPG Sync

on:
  schedule:
    - cron: '0 */3 * * *' # Checks every 3 hours
  workflow_dispatch: # Allows manual triggering

jobs:
  sync-playlists:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install required tools
        run: sudo apt-get update && sudo apt-get install -y jq gzip

      - name: Check for updates, convert, deduplicate, and sync
        run: |
          CHANGED=false
          EPG_CHANGED=false
          > new_shas.txt
          > new_epg_shas.txt
          echo "#EXTM3U" > master_playlist.m3u
          echo '<?xml version="1.0" encoding="UTF-8"?>' > master_epg.xml
          echo '<tv generator-info-name="GitHub Actions Auto-Sync">' >> master_epg.xml
          
          while IFS= read -r line || [[ -n "$line" ]]; do
            line=$(echo "$line" | tr -d '\r')
            [[ -z "$line" ]] && continue
            
            OWNER=$(echo "$line" | cut -d'/' -f1)
            REPO=$(echo "$line" | cut -d'/' -f2)
            FILE_PATH=$(echo "$line" | cut -d'/' -f3-)
            
            API_URL="https://api.github.com/repos/$OWNER/$REPO/contents/$FILE_PATH"
            RESPONSE=$(curl -s -H "Accept: application/vnd.github.v3+json" "$API_URL")
            
            FILE_SHA=$(echo "$RESPONSE" | jq -r '.sha // "none"' 2>/dev/null || echo "none")
            HTML_URL=$(echo "$RESPONSE" | jq -r '.html_url // "none"' 2>/dev/null || echo "none")
            
            if [ "$FILE_SHA" = "none" ] || [ -z "$FILE_SHA" ]; then
              echo "⚠️ Warning: Could not fetch $line. Skipping..."
              continue
            fi
            
            BRANCH=$(echo "$HTML_URL" | awk -F'/blob/' '{print $2}' | awk -F'/' '{print $1}')
            RAW_URL="https://raw.githubusercontent.com/$OWNER/$REPO/$BRANCH/$FILE_PATH"
            
            IS_EPG=false
            if [[ "$FILE_PATH" == *.xml ]] || [[ "$FILE_PATH" == *.xml.gz ]]; then
              IS_EPG=true
            fi
            
            if [ "$IS_EPG" = true ]; then
              if [ -f last_epg_shas.txt ]; then
                OLD_SHA=$(awk -v key="$line" -F: '$1 == key {print $2}' last_epg_shas.txt)
              else
                OLD_SHA=""
              fi
            else
              if [ -f last_shas.txt ]; then
                OLD_SHA=$(awk -v key="$line" -F: '$1 == key {print $2}' last_shas.txt)
              else
                OLD_SHA=""
              fi
            fi
            
            if [ "$IS_EPG" = true ]; then
              echo "${line}:${FILE_SHA}" >> new_epg_shas.txt
            else
              echo "${line}:${FILE_SHA}" >> new_shas.txt
            fi
            
            if [ "$FILE_SHA" != "$OLD_SHA" ]; then
              echo "🚨 Update detected in $line! Downloading..."
              curl -s -L "$RAW_URL" > temp_file.txt
              
              if [ "$IS_EPG" = true ]; then
                EPG_CHANGED=true
                echo "📺 Processing EPG file..."
                if [[ "$FILE_PATH" == *.gz ]]; then
                  echo "🗜️ Checking if file is a valid gzip archive..."
                  if file temp_file.txt | grep -q "gzip compressed"; then
                    echo "✅ Valid gzip found. Decompressing..."
                    if ! gunzip -c temp_file.txt > temp_epg.xml; then
                      echo "⚠️ Decompression failed. Skipping this file."
                      continue
                    fi
                  else
                    echo "⚠️ Warning: File is NOT a gzip archive. Trying as plain XML..."
                    mv temp_file.txt temp_epg.xml
                  fi
                else
                  mv temp_file.txt temp_epg.xml
                fi
                sed -n '/<tv/,/<\/tv>/p' temp_epg.xml | sed '/<?xml/d' | sed '1d;$d' >> master_epg.xml
                
              elif [[ "$FILE_PATH" == *.json ]]; then
                CHANGED=true
                echo "📋 Converting JSON to M3U..."
                printf '%s\n' \
                  'def process_item:' \
                  '  "#EXTINF:-1 tvg-logo=\"" + (.logo // .icon // .stream_icon // "") + "\" group-title=\"" + (.group // .category // .category_name // "Uncategorized") + "\"," + (.name // .title // .channel_name // "Unknown") + "\n" + (.url // .stream // .link // .channel_url // "");' \
                  'def get_items:' \
                  '  if type == "array" then .' \
                  '  elif .streams then .streams' \
                  '  elif .channels then .channels' \
                  '  elif .data then .data' \
                  '  elif .items then .items' \
                  '  else [] end;' \
                  'get_items | .[] | process_item' > script.jq
                
                jq -r -f script.jq temp_file.txt | sed '/^#EXTM3U/d' >> master_playlist.m3u || true

              else
                CHANGED=true
                echo "📺 Processing M3U/M3U8 file..."
                sed '/^#EXTM3U/d' temp_file.txt >> master_playlist.m3u
              fi
            else
              echo "✅ No change in $line"
            fi
            sleep 1
          done < sources.txt
          
          echo '</tv>' >> master_epg.xml
          
          if [ "$CHANGED" = false ] && [ "$EPG_CHANGED" = false ]; then
            echo "🛑 No changes detected. Exiting early."
            exit 0
          fi
          
          # ==========================================
          # 🌍 ADD GLOBAL TAMIL PLAYLIST (iptv-org)
          # ==========================================
          echo "📺 Downloading global Tamil playlist from iptv-org..."
          curl -s -L "https://iptv-org.github.io/iptv/languages/tam.m3u" | sed '/^#EXTM3U/d' >> master_playlist.m3u || true

          # ==========================================
          # 🧹 SMART FILTER, CATEGORIZER & DEDUPLICATOR
          # ==========================================
          echo "🧹 Filtering for Tamil/English/Local/Kids and segregating categories..."
          awk '
          BEGIN { extinf = ""; tags = ""; keep = 0 }
          /^#EXTINF:/ {
              extinf = $0
              tags = ""
              lower_line = tolower($0)
              
              # STRICT FILTER: Only keep if it matches Tamil, English, Local, Indian, Kids, or specific providers
              if (lower_line ~ /tamil|local|indian|english|kids|cartoon|movie|series|sun tv|sun music|sun news|sun life|sun hd|vijay|zee tamil|zee thirai|jaya tv|jaya plus|jaya movie|ktv|raj tv|raj news|raj digital|raj musix|polimer|thanthi|kalaignar|captain|sathya|vasanth|chutti|podhigai|makkal|puthiya|puthuyugam|isaiaruvi|madhimugam|vendhar|adithya|sirippoli|win news|news j|news7|news18|eet|ibc|murasu|subin|sana|galaxyott|applelive|sscloud|ipcloud|onecloudlive|bmlive|phoenixcreations|singamcloud|olidigital|tamilstream|rojatv|maxtn|notvstream|apserver|rcserver|brightmeltech|mindspell|7starcloud|livebox|yuppcdn|tangotv|dailyhunt|pishow|streamjo|massstream|tatatv|ranapk|mr bean|motu patlu|chhota bheem|scooby|vir the robot/) {
                  keep = 1
              } else {
                  keep = 0
              }
              next
          }
          /^#/ {
              if (extinf != "" && keep == 1) {
                  tags = tags $0 "\n"
              }
              next
          }
          {
              line = $0
              gsub(/^[ \t\r]+/, "", line)
              gsub(/[ \t\r]+$/, "", line)
              
              if (line ~ /^(https?|rtmp|mms|udp|rtp|file):\/\//) {
                  if (extinf != "" && keep == 1) {
                      if (!seen[line]++) {
                          print extinf
                          if (tags != "") printf "%s", tags
                          print line
                      }
                      extinf = ""
                      tags = ""
                      keep = 0
                  }
              } else {
                  extinf = ""
                  tags = ""
                  keep = 0
              }
          }
          ' master_playlist.m3u > cleaned_playlist.m3u
          
          echo "#EXTM3U" > master_playlist.m3u
          cat cleaned_playlist.m3u >> master_playlist.m3u
          
          if [ "$CHANGED" = true ]; then
            mv new_shas.txt last_shas.txt
          fi
          if [ "$EPG_CHANGED" = true ]; then
            mv new_epg_shas.txt last_epg_shas.txt
          fi
          
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          if [ "$CHANGED" = true ] && [ "$EPG_CHANGED" = true ]; then
            git add master_playlist.m3u master_epg.xml last_shas.txt last_epg_shas.txt
            git diff --staged --quiet || git commit -m "Auto-sync: Filtered Tamil/English/Local/Kids, Cleaned, Updated M3U and EPG"
          elif [ "$CHANGED" = true ]; then
            git add master_playlist.m3u last_shas.txt
            git diff --staged --quiet || git commit -m "Auto-sync: Filtered Tamil/English/Local/Kids, Cleaned, Updated M3U only"
          elif [ "$EPG_CHANGED" = true ]; then
            git add master_epg.xml last_epg_shas.txt
            git diff --staged --quiet || git commit -m "Auto-sync: Updated EPG only"
          fi
          
          git push
