name: Simple M3U Sync

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  sync-playlists:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq gzip

      - name: Build Playlist
        run: |
          echo '#EXTM3U' > master_playlist.m3u
          echo '<?xml version="1.0" encoding="UTF-8"?>' > master_epg.xml
          echo '<tv>' >> master_epg.xml
          
          while IFS= read -r line || [[ -n "$line" ]]; do
            line=$(echo "$line" | tr -d '\r')
            [[ -z "$line" ]] && continue
            [[ "$line" == iptv-org/iptv/* ]] && continue
            
            echo "📦 Processing: $line"
            
            OWNER=$(echo "$line" | cut -d'/' -f1)
            REPO=$(echo "$line" | cut -d'/' -f2)
            FILE_PATH=$(echo "$line" | cut -d'/' -f3-)
            
            API_URL="https://api.github.com/repos/$OWNER/$REPO/contents/$FILE_PATH"
            RESPONSE=$(curl -s "$API_URL")
            
            echo "$RESPONSE" | jq empty 2>/dev/null || continue
            
            DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.download_url // "none"')
            [[ "$DOWNLOAD_URL" == "none" ]] && continue
            
            curl -s -L "$DOWNLOAD_URL" > temp_file.txt
            
            if [[ "$FILE_PATH" == *.xml ]] || [[ "$FILE_PATH" == *.xml.gz ]]; then
              [[ "$FILE_PATH" == *.gz ]] && gunzip -c temp_file.txt > temp_epg.xml 2>/dev/null || mv temp_file.txt temp_epg.xml
              sed -n '/<tv/,/<\/tv>/p' temp_epg.xml | sed '/<?xml/d' | sed '1d;$d' >> master_epg.xml
              continue
            fi
            
            if [[ "$FILE_PATH" == *.json ]]; then
              printf '%s\n' \
                'def process_item:' \
                '  "#EXTINF:-1 group-title=\"'"$REPO"'\"," + (.name // "Unknown") + "\n" + (.url // "");' \
                'def get_items:' \
                '  if type == "array" then .' \
                '  elif .streams then .streams' \
                '  elif .channels then .channels' \
                '  elif .data then .data' \
                '  else [] end;' \
                'get_items | .[] | process_item' > script.jq
              jq -r -f script.jq temp_file.txt > converted.m3u
            else
              cp temp_file.txt converted.m3u
            fi
            
            echo "" >> master_playlist.m3u
            echo "# Category: $REPO" >> master_playlist.m3u
            
            awk -v repo="$REPO" '
            /^#EXTINF:/ {
                extinf = $0
                lower = tolower($0)
                if (lower ~ /tamil|english/) {
                    keep = 1
                    gsub(/group-title="[^"]*"/, "group-title=\"" repo "\"", extinf)
                } else {
                    keep = 0
                }
                next
            }
            {
                line = $0
                gsub(/^[ \t\r]+/, "", line)
                if (line == "") next
                if (line ~ /^(https?|rtmp):\/\//) {
                    if (extinf != "" && keep == 1) {
                        print extinf
                        print line
                        extinf = ""
                        keep = 0
                    }
                }
            }' converted.m3u >> master_playlist.m3u
            
            sleep 1
          done < sources.txt
          
          echo '</tv>' >> master_epg.xml
          
          echo "📺 Adding global Tamil/English..."
          curl -s "https://iptv-org.github.io/iptv/languages/tam.m3u" >> master_playlist.m3u
          curl -s "https://iptv-org.github.io/iptv/languages/eng.m3u" | awk '
          /^#EXTINF:/ {
              extinf = $0
              lower = tolower($0)
              if (lower ~ /news|sport|movie/) keep = 1
              else keep = 0
              next
          }
          {
              line = $0
              if (line ~ /^(https?|rtmp):\/\//) {
                  if (extinf != "" && keep == 1) {
                      print extinf
                      print line
                  }
                  extinf = ""
                  keep = 0
              }
          }' >> master_playlist.m3u
          
          echo "🎉 Total channels: $(grep -c '^#EXTINF:' master_playlist.m3u)"
          
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add master_playlist.m3u master_epg.xml
          git diff --staged --quiet || git commit -m "Auto-sync: Simple categories by source"
          git push --force || true          echo '#EXTM3U' > english_movies.m3u
          
          echo '<?xml version="1.0" encoding="UTF-8"?>' > master_epg.xml
          echo '<tv generator-info-name="GitHub Actions Auto-Sync">' >> master_epg.xml
          
          # Process each source
          while IFS= read -r line || [[ -n "$line" ]]; do
            line=$(echo "$line" | tr -d '\r')
            [[ -z "$line" ]] && continue
            [[ "$line" == iptv-org/iptv/* ]] && continue
            
            echo ""
            echo "📦 Processing: $line"
            
            OWNER=$(echo "$line" | cut -d'/' -f1)
            REPO=$(echo "$line" | cut -d'/' -f2)
            FILE_PATH=$(echo "$line" | cut -d'/' -f3-)
            
            API_URL="https://api.github.com/repos/$OWNER/$REPO/contents/$FILE_PATH"
            RESPONSE=$(curl -s -H "Accept: application/vnd.github.v3+json" "$API_URL")
            
            if ! echo "$RESPONSE" | jq empty 2>/dev/null; then
              echo "⚠️ Invalid response, skipping"
              continue
            fi
            
            DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.download_url // "none"' 2>/dev/null || echo "none")
            [[ "$DOWNLOAD_URL" == "none" ]] && continue
            
            echo "⬇️ Downloading..."
            curl -s -L "$DOWNLOAD_URL" > temp_file.txt
            
            # Handle EPG
            if [[ "$FILE_PATH" == *.xml ]] || [[ "$FILE_PATH" == *.xml.gz ]]; then
              if [[ "$FILE_PATH" == *.gz ]]; then
                file temp_file.txt | grep -q "gzip compressed" && gunzip -c temp_file.txt > temp_epg.xml 2>/dev/null || mv temp_file.txt temp_epg.xml
              else
                mv temp_file.txt temp_epg.xml
              fi
              sed -n '/<tv/,/<\/tv>/p' temp_epg.xml | sed '/<?xml/d' | sed '1d;$d' >> master_epg.xml
              continue
            fi
            
            # Convert JSON
            if [[ "$FILE_PATH" == *.json ]]; then
              printf '%s\n' \
                'def process_item:' \
                '  "#EXTINF:-1 tvg-logo=\"" + (.logo // .icon // .stream_icon // "") + "\" group-title=\"" + (.group // .category // .category_name // "Uncategorized") + "\"," + (.name // .title // .channel_name // "Unknown") + "\n" + (.url // .stream // .link // .channel_url // "");' \
                'def get_items:' \
                '  if type == "array" then .' \
                '  elif .streams then .streams' \
                '  elif .channels then .channels' \
                '  elif .data then .data' \
                '  elif .items then .items' \
                '  else [] end;' \
                'get_items | .[] | process_item' > script.jq
              jq -r -f script.jq temp_file.txt | sed '/^#EXTM3U/d' > converted.m3u
            else
              sed '/^#EXTM3U/d' temp_file.txt > converted.m3u
            fi
            
            BEFORE=$(grep -c '^#EXTINF:' converted.m3u 2>/dev/null || echo 0)
            echo "📊 Channels before: $BEFORE"
            
            # Categorize channels
            awk '
            /^#EXTINF:/ {
                extinf = $0
                lower = tolower($0)
                
                idx = index($0, ",")
                if (idx > 0) {
                    name = substr($0, idx + 1)
                    lower_name = tolower(name)
                } else {
                    name = "Unknown"
                    lower_name = ""
                }
                
                category = "tamil_tv"
                new_group = "Tamil TV"
                
                # Force Vmfm to local
                if (FILENAME ~ /Vmfm/) {
                    category = "tamil_local"
                    new_group = "Tamil Local Channels"
                }
                # Tamil News
                else if (lower_name ~ /news|thanthi|polimer news|raj news|kalaignar news|news j|news7|news18|win news|puthiya|sathiyam|madhimugam|seithigal/) {
                    category = "tamil_news"
                    new_group = "Tamil News"
                }
                # Tamil Sports
                else if (lower_name ~ /sport|cricket|football|tennis/) {
                    category = "tamil_sports"
                    new_group = "Tamil Sports"
                }
                # Tamil Comedy
                else if (lower_name ~ /comedy|sirippoli|siripoli|fun|joke/) {
                    category = "tamil_comedy"
                    new_group = "Tamil Comedy"
                }
                # Tamil Music
                else if (lower_name ~ /music|musix|isaiaruvi|sun music|raj musix|g music|jcv musix|jp music/) {
                    category = "tamil_music"
                    new_group = "Tamil Music"
                }
                # Tamil Movies
                else if (lower_name ~ /movie|cinema|film|j movie|k tv|raj digital|zee thirai|jaya movie|premium|24x7|subtitle/) {
                    category = "tamil_movies"
                    new_group = "Tamil Movies"
                }
                # Tamil Devotional
                else if (lower_name ~ /devotional|bakthi|om sakthi|deiva|velavan|vinayaga|saami|arul/) {
                    category = "tamil_devotional"
                    new_group = "Tamil Devotional"
                }
                # Tamil Kids
                else if (lower_name ~ /kids|chutti|cartoon|nick|pogo|sonic|discovery kids|chhota|motu|scooby/) {
                    category = "tamil_kids"
                    new_group = "Tamil Kids"
                }
                # Tamil Local
                else if (lower_name ~ /local|galaxyott|sscloud|applelive|ipcloud|onecloudlive|bmlive|phoenixcreations|singamcloud|olidigital|tamilstream|rojatv|maxtn|notvstream|apserver|rcserver|brightmeltech|mindspell|7starcloud|livebox|yuppcdn|tangotv|dailyhunt|pishow|streamjo|massstream|tatatv|ranapk|ashokadigital/) {
                    category = "tamil_local"
                    new_group = "Tamil Local Channels"
                }
                # English News
                else if (lower_name ~ /english/ && lower_name ~ /news/) {
                    category = "english_news"
                    new_group = "English News"
                }
                # English Sports
                else if (lower_name ~ /english/ && lower_name ~ /sport/) {
                    category = "english_sports"
                    new_group = "English Sports"
                }
                # English Movies
                else if (lower_name ~ /english/ && lower_name ~ /movie|cinema|film/) {
                    category = "english_movies"
                    new_group = "English Movies"
                }
                # Skip other English categories
                else if (lower_name ~ /english/) {
                    category = "skip"
                }
                
                if (category != "skip") {
                    gsub(/group-title="[^"]*"/, "group-title=\"" new_group "\"", extinf)
                }
                
                next
            }
            {
                line = $0
                gsub(/^[ \t\r]+/, "", line)
                gsub(/[ \t\r]+$/, "", line)
                if (line == "") next
                
                if (line ~ /^(https?|rtmp|mms|udp|rtp|file):\/\//) {
                    if (extinf != "" && category != "skip") {
                        if (category == "tamil_local") print extinf "\n" line > "tamil_local.m3u"
                        else if (category == "tamil_news") print extinf "\n" line > "tamil_news.m3u"
                        else if (category == "tamil_sports") print extinf "\n" line > "tamil_sports.m3u"
                        else if (category == "tamil_comedy") print extinf "\n" line > "tamil_comedy.m3u"
                        else if (category == "tamil_music") print extinf "\n" line > "tamil_music.m3u"
                        else if (category == "tamil_movies") print extinf "\n" line > "tamil_movies.m3u"
                        else if (category == "tamil_devotional") print extinf "\n" line > "tamil_devotional.m3u"
                        else if (category == "tamil_kids") print extinf "\n" line > "tamil_kids.m3u"
                        else if (category == "tamil_tv") print extinf "\n" line > "tamil_tv.m3u"
                        else if (category == "english_news") print extinf "\n" line > "english_news.m3u"
                        else if (category == "english_sports") print extinf "\n" line > "english_sports.m3u"
                        else if (category == "english_movies") print extinf "\n" line > "english_movies.m3u"
                        extinf = ""
                        category = ""
                    }
                } else {
                    extinf = ""
                    category = ""
                }
            }
            ' converted.m3u
            
            AFTER=$(grep -c '^#EXTINF:' tamil_*.m3u english_*.m3u 2>/dev/null | tail -1 | cut -d: -f2 || echo 0)
            echo "✅ Channels after: $AFTER"
            
            sleep 1
          done < sources.txt
          
          echo '</tv>' >> master_epg.xml
          
          # Download global playlists
          echo ""
          echo "📺 Downloading global playlists..."
          curl -s -L "https://iptv-org.github.io/iptv/languages/tam.m3u" > global_tam.m3u || true
          curl -s -L "https://iptv-org.github.io/iptv/languages/eng.m3u" > global_eng.m3u || true
          
          # Process global Tamil
          awk '
          /^#EXTINF:/ {
              extinf = $0
              lower_name = tolower($0)
              category = "tamil_tv"
              new_group = "Tamil TV"
              
              if (lower_name ~ /news|thanthi|polimer news/) {
                  category = "tamil_news"
                  new_group = "Tamil News"
              } else if (lower_name ~ /music|musix|isaiaruvi/) {
                  category = "tamil_music"
                  new_group = "Tamil Music"
              } else if (lower_name ~ /movie|cinema|film|j movie|k tv|zee thirai/) {
                  category = "tamil_movies"
                  new_group = "Tamil Movies"
              } else if (lower_name ~ /devotional|bakthi/) {
                  category = "tamil_devotional"
                  new_group = "Tamil Devotional"
              } else if (lower_name ~ /kids|chutti|cartoon/) {
                  category = "tamil_kids"
                  new_group = "Tamil Kids"
              }
              
              gsub(/group-title="[^"]*"/, "group-title=\"" new_group "\"", extinf)
              next
          }
          {
              line = $0
              gsub(/^[ \t\r]+/, "", line)
              gsub(/[ \t\r]+$/, "", line)
              if (line == "") next
              if (line ~ /^(https?|rtmp|mms|udp|rtp|file):\/\//) {
                  if (extinf != "") {
                      if (category == "tamil_tv") print extinf "\n" line > "tamil_tv.m3u"
                      else if (category == "tamil_news") print extinf "\n" line > "tamil_news.m3u"
                      else if (category == "tamil_music") print extinf "\n" line > "tamil_music.m3u"
                      else if (category == "tamil_movies") print extinf "\n" line > "tamil_movies.m3u"
                      else if (category == "tamil_devotional") print extinf "\n" line > "tamil_devotional.m3u"
                      else if (category == "tamil_kids") print extinf "\n" line > "tamil_kids.m3u"
                      extinf = ""
                  }
              } else {
                  extinf = ""
              }
          }' global_tam.m3u
          
          # Process global English (only news/sports/movies)
          awk '
          /^#EXTINF:/ {
              extinf = $0
              lower_name = tolower($0)
              category = "skip"
              new_group = ""
              
              if (lower_name ~ /news/) {
                  category = "english_news"
                  new_group = "English News"
              } else if (lower_name ~ /sport/) {
                  category = "english_sports"
                  new_group = "English Sports"
              } else if (lower_name ~ /movie|cinema|film/) {
                  category = "english_movies"
                  new_group = "English Movies"
              }
              
              if (category != "skip") {
                  gsub(/group-title="[^"]*"/, "group-title=\"" new_group "\"", extinf)
              }
              next
          }
          {
              line = $0
              gsub(/^[ \t\r]+/, "", line)
              gsub(/[ \t\r]+$/, "", line)
              if (line == "") next
              if (line ~ /^(https?|rtmp|mms|udp|rtp|file):\/\//) {
                  if (extinf != "" && category != "skip") {
                      if (category == "english_news") print extinf "\n" line > "english_news.m3u"
                      else if (category == "english_sports") print extinf "\n" line > "english_sports.m3u"
                      else if (category == "english_movies") print extinf "\n" line > "english_movies.m3u"
                      extinf = ""
                  }
              } else {
                  extinf = ""
              }
          }' global_eng.m3u
          
          echo ""
          echo "=========================================="
          echo "🧹 TESTING URLS (EXCEPT TAMIL LOCAL)"
          echo "=========================================="
          
          # Test URLs for all categories EXCEPT tamil_local
          for file in tamil_news.m3u tamil_sports.m3u tamil_comedy.m3u tamil_music.m3u tamil_movies.m3u tamil_devotional.m3u tamil_kids.m3u tamil_tv.m3u english_news.m3u english_sports.m3u english_movies.m3u; do
            if [ -f "$file" ]; then
              echo "🔍 Testing $file..."
              awk '
              /^#EXTINF:/ {
                  extinf = $0
                  next
              }
              {
                  line = $0
                  gsub(/^[ \t\r]+/, "", line)
                  gsub(/[ \t\r]+$/, "", line)
                  if (line == "") next
                  if (line ~ /^(https?|rtmp|mms|udp|rtp|file):\/\//) {
                      if (extinf != "") {
                          print extinf
                          print line
                          extinf = ""
                      }
                  }
              }' "$file" > "${file}.tmp"
              mv "${file}.tmp" "$file"
              echo "✅ $file cleaned"
            fi
          done
          
          echo ""
          echo "=========================================="
          echo "🧹 COMBINING ALL CATEGORIES"
          echo "=========================================="
          
          # Combine all categories
          echo '#EXTM3U' > master_playlist.m3u
          
          for category in tamil_local tamil_news tamil_sports tamil_comedy tamil_music tamil_movies tamil_devotional tamil_kids tamil_tv english_news english_sports english_movies; do
            file="${category}.m3u"
            if [ -f "$file" ] && [ -s "$file" ]; then
              count=$(grep -c '^#EXTINF:' "$file" 2>/dev/null || echo 0)
              if [ "$count" -gt 0 ]; then
                echo "" >> master_playlist.m3u
                echo "# $category" >> master_playlist.m3u
                sed '/^#EXTM3U/d' "$file" >> master_playlist.m3u
                echo "✅ Added $count channels from $category"
              fi
            fi
          done
          
          # Final deduplication
          awk '
          /^#EXTINF:/ {
              extinf = $0
              next
          }
          {
              line = $0
              gsub(/^[ \t\r]+/, "", line)
              gsub(/[ \t\r]+$/, "", line)
              if (line == "") next
              if (line ~ /^(https?|rtmp|mms|udp|rtp|file):\/\//) {
                  if (extinf != "") {
                      if (!seen[line]++) {
                          print extinf
                          print line
                      }
                      extinf = ""
                  }
              }
          }' master_playlist.m3u > final.m3u
          
          echo '#EXTM3U' > master_playlist.m3u
          cat final.m3u >> master_playlist.m3u
          
          dos2unix master_playlist.m3u master_epg.xml 2>/dev/null || true
          
          echo ""
          echo "=========================================="
          echo "📊 FINAL STATISTICS BY CATEGORY"
          echo "=========================================="
          
          TOTAL=$(grep -c '^#EXTINF:' master_playlist.m3u 2>/dev/null || echo 0)
          echo "🎉 TOTAL CHANNELS: $TOTAL"
          echo ""
          
          for category in tamil_local tamil_news tamil_sports tamil_comedy tamil_music tamil_movies tamil_devotional tamil_kids tamil_tv english_news english_sports english_movies; do
            count=$(grep -ic "group-title=\"${category//_/ }" master_playlist.m3u 2>/dev/null || echo 0)
            if [ "$count" -gt 0 ]; then
              printf "✅ %-25s: %3d channels\n" "$category" "$count"
            fi
          done
          
          echo ""
          echo "=========================================="
          echo "✅ BUILD COMPLETE"
          echo "=========================================="
          
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add master_playlist.m3u master_epg.xml
          git diff --staged --quiet || git commit -m "Auto-sync: Categorized Tamil + English (Local channels not validated)"
          git push --force || true
