name: Smart M3U + EPG Sync

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  sync-playlists:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install required tools
        run: sudo apt-get update && sudo apt-get install -y jq gzip dos2unix

      - name: Build Playlist with Proper Categories
        run: |
          echo "=========================================="
          echo "🚀 STARTING PLAYLIST BUILD"
          echo "=========================================="
          
          # Create separate files for each category
          echo '#EXTM3U' > local_channels.m3u
          echo '#EXTM3U' > tamil_iptv.m3u
          echo '#EXTM3U' > tamil_tv.m3u
          echo '#EXTM3U' > tamil_movies.m3u
          echo '#EXTM3U' > tamil_subtitle_movies.m3u
          echo '#EXTM3U' > kids_cartoon.m3u
          echo '#EXTM3U' > english_news.m3u
          echo '#EXTM3U' > english_sports.m3u
          echo '#EXTM3U' > english_movies.m3u
          
          echo '<?xml version="1.0" encoding="UTF-8"?>' > master_epg.xml
          echo '<tv generator-info-name="GitHub Actions Auto-Sync">' >> master_epg.xml
          
          while IFS= read -r line || [[ -n "$line" ]]; do
            line=$(echo "$line" | tr -d '\r')
            if [[ -z "$line" ]]; then
              continue
            fi
            
            if [[ "$line" == iptv-org/iptv/* ]]; then
              echo "⏭️ Skipping iptv-org (will download separately)"
              continue
            fi
            
            echo ""
            echo "📦 Processing: $line"
            
            OWNER=$(echo "$line" | cut -d'/' -f1)
            REPO=$(echo "$line" | cut -d'/' -f2)
            FILE_PATH=$(echo "$line" | cut -d'/' -f3-)
            
            API_URL="https://api.github.com/repos/$OWNER/$REPO/contents/$FILE_PATH"
            RESPONSE=$(curl -s -H "Accept: application/vnd.github.v3+json" "$API_URL")
            
            if ! echo "$RESPONSE" | jq empty 2>/dev/null; then
              continue
            fi
            
            DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.download_url // "none"' 2>/dev/null || echo "none")
            
            if [ "$DOWNLOAD_URL" = "none" ] || [ -z "$DOWNLOAD_URL" ]; then
              continue
            fi
            
            echo "⬇️ Downloading..."
            curl -s -L "$DOWNLOAD_URL" > temp_file.txt
            
            if [[ "$FILE_PATH" == *.xml ]] || [[ "$FILE_PATH" == *.xml.gz ]]; then
              echo "📺 Processing EPG file..."
              if [[ "$FILE_PATH" == *.gz ]]; then
                if file temp_file.txt | grep -q "gzip compressed"; then
                  gunzip -c temp_file.txt > temp_epg.xml 2>/dev/null
                else
                  mv temp_file.txt temp_epg.xml
                fi
              else
                mv temp_file.txt temp_epg.xml
              fi
              sed -n '/<tv/,/<\/tv>/p' temp_epg.xml | sed '/<?xml/d' | sed '1d;$d' >> master_epg.xml
              continue
            fi
            
            if [[ "$FILE_PATH" == *.json ]]; then
              printf '%s\n' \
                'def process_item:' \
                '  "#EXTINF:-1 tvg-logo=\"" + (.logo // .icon // .stream_icon // "") + "\" group-title=\"" + (.group // .category // .category_name // "Uncategorized") + "\"," + (.name // .title // .channel_name // "Unknown") + "\n" + (.url // .stream // .link // .channel_url // "");' \
                'def get_items:' \
                '  if type == "array" then .' \
                '  elif .streams then .streams' \
                '  elif .channels then .channels' \
                '  elif .data then .data' \
                '  elif .items then .items' \
                '  else [] end;' \
                'get_items | .[] | process_item' > script.jq
              jq -r -f script.jq temp_file.txt | sed '/^#EXTM3U/d' > converted.m3u
            else
              sed '/^#EXTM3U/d' temp_file.txt > converted.m3u
            fi
            
            echo "🧹 Categorizing channels..."
            
            # Process each channel and categorize
            awk '
            /^#EXTINF:/ {
                extinf = $0
                lower_line = tolower($0)
                
                # Extract channel name
                idx = index($0, ",")
                if (idx > 0) {
                    channel_name = tolower(substr($0, idx + 1))
                } else {
                    channel_name = ""
                }
                
                # Determine category
                category = ""
                
                # Vmfm channels -> local channels
                if (FILENAME ~ /Vmfm/) {
                    # Force to local channels
                    gsub(/group-title="[^"]*"/, "", extinf)
                    extinf = extinf " group-title=\"local channels\""
                    category = "local"
                }
                # Tamil channels
                else if (lower_line ~ /tamil/ || channel_name ~ /sun tv|vijay|zee tamil|jaya|ktv|raj tv|polimer|thanthi|kalaignar|vasanth|chutti|podhigai|makkal|puthiya|isaiaruvi|madhimugam|vendhar|adithya|sirippoli|win news|news j|news7|eet|ibc|murasu|subin|sana|galaxyott|applelive|sscloud|ipcloud|onecloudlive|bmlive|phoenixcreations|singamcloud|olidigital|tamilstream|rojatv|maxtn|notvstream|apserver|rcserver|brightmeltech|mindspell|7starcloud|livebox|yuppcdn|tangotv|dailyhunt|pishow|streamjo|massstream|tatatv|ranapk/) {
                    # Check if it is movies/series
                    if (channel_name ~ /movie|cinema|film|series|24x7|premium/) {
                        category = "tamil_movies"
                    }
                    # Check if it is subtitle movies
                    else if (channel_name ~ /subtitle/) {
                        category = "tamil_subtitle"
                    }
                    # Regular Tamil TV
                    else {
                        category = "tamil_tv"
                    }
                }
                # Kids/Cartoon
                else if (lower_line ~ /kids|cartoon|mr bean|motu patlu|chhota bheem|scooby|vir the robot/) {
                    category = "kids"
                }
                # English channels (only news/sports/movies)
                else if (lower_line ~ /english/) {
                    if (channel_name ~ /news/) {
                        category = "english_news"
                    } else if (channel_name ~ /sport/) {
                        category = "english_sports"
                    } else if (channel_name ~ /movie|cinema|film/) {
                        category = "english_movies"
                    } else {
                        category = "skip"
                    }
                }
                else {
                    category = "skip"
                }
                
                next
            }
            {
                line = $0
                gsub(/^[ \t\r]+/, "", line)
                gsub(/[ \t\r]+$/, "", line)
                if (line == "") next
                if (line ~ /^(https?|rtmp|mms|udp|rtp|file):\/\//) {
                    if (extinf != "" && category != "skip") {
                        if (category == "local") print extinf "\n" line > "local_channels.m3u"
                        else if (category == "tamil_tv") print extinf "\n" line > "tamil_tv.m3u"
                        else if (category == "tamil_movies") print extinf "\n" line > "tamil_movies.m3u"
                        else if (category == "tamil_subtitle") print extinf "\n" line > "tamil_subtitle_movies.m3u"
                        else if (category == "kids") print extinf "\n" line > "kids_cartoon.m3u"
                        else if (category == "english_news") print extinf "\n" line > "english_news.m3u"
                        else if (category == "english_sports") print extinf "\n" line > "english_sports.m3u"
                        else if (category == "english_movies") print extinf "\n" line > "english_movies.m3u"
                        extinf = ""
                        category = ""
                    }
                } else {
                    extinf = ""
                    category = ""
                }
            }
            ' converted.m3u
            
            echo "✅ Channels categorized"
            sleep 1
          done < sources.txt
          
          echo '</tv>' >> master_epg.xml
          
          echo ""
          echo "=========================================="
          echo "📺 DOWNLOADING GLOBAL PLAYLISTS"
          echo "=========================================="
          
          # Download global Tamil playlist
          echo "📺 Downloading global Tamil playlist..."
          curl -s -L "https://iptv-org.github.io/iptv/languages/tam.m3u" | awk '
          /^#EXTINF:/ {
              extinf = $0
              lower_line = tolower($0)
              idx = index($0, ",")
              if (idx > 0) {
                  channel_name = tolower(substr($0, idx + 1))
              } else {
                  channel_name = ""
              }
              
              if (channel_name ~ /movie|cinema|film|series|24x7|premium/) {
                  category = "tamil_movies"
              } else if (channel_name ~ /subtitle/) {
                  category = "tamil_subtitle"
              } else {
                  category = "tamil_tv"
              }
              next
          }
          {
              line = $0
              gsub(/^[ \t\r]+/, "", line)
              gsub(/[ \t\r]+$/, "", line)
              if (line == "") next
              if (line ~ /^(https?|rtmp|mms|udp|rtp|file):\/\//) {
                  if (extinf != "") {
                      if (category == "tamil_tv") print extinf "\n" line > "tamil_tv.m3u"
                      else if (category == "tamil_movies") print extinf "\n" line > "tamil_movies.m3u"
                      else if (category == "tamil_subtitle") print extinf "\n" line > "tamil_subtitle_movies.m3u"
                      extinf = ""
                      category = ""
                  }
              } else {
                  extinf = ""
                  category = ""
              }
          }'
          
          # Download global English playlist (only news/sports/movies)
          echo "📺 Downloading global English playlist..."
          curl -s -L "https://iptv-org.github.io/iptv/languages/eng.m3u" | awk '
          /^#EXTINF:/ {
              extinf = $0
              lower_line = tolower($0)
              idx = index($0, ",")
              if (idx > 0) {
                  channel_name = tolower(substr($0, idx + 1))
              } else {
                  channel_name = ""
              }
              
              if (channel_name ~ /news/) {
                  category = "english_news"
              } else if (channel_name ~ /sport/) {
                  category = "english_sports"
              } else if (channel_name ~ /movie|cinema|film/) {
                  category = "english_movies"
              } else {
                  category = "skip"
              }
              next
          }
          {
              line = $0
              gsub(/^[ \t\r]+/, "", line)
              gsub(/[ \t\r]+$/, "", line)
              if (line == "") next
              if (line ~ /^(https?|rtmp|mms|udp|rtp|file):\/\//) {
                  if (extinf != "" && category != "skip") {
                      if (category == "english_news") print extinf "\n" line > "english_news.m3u"
                      else if (category == "english_sports") print extinf "\n" line > "english_sports.m3u"
                      else if (category == "english_movies") print extinf "\n" line > "english_movies.m3u"
                      extinf = ""
                      category = ""
                  }
              } else {
                  extinf = ""
                  category = ""
              }
          }'
          
          echo ""
          echo "=========================================="
          echo "🧹 COMBINING ALL CATEGORIES"
          echo "=========================================="
          
          # Combine all categories in order
          echo '#EXTM3U' > master_playlist.m3u
          
          # Add each category with header
          if [ -s local_channels.m3u ]; then
              echo "" >> master_playlist.m3u
              echo "# Local Channels" >> master_playlist.m3u
              sed '/^#EXTM3U/d' local_channels.m3u >> master_playlist.m3u
          fi
          
          if [ -s tamil_tv.m3u ]; then
              echo "" >> master_playlist.m3u
              echo "# Tamil TV Channels" >> master_playlist.m3u
              sed '/^#EXTM3U/d' tamil_tv.m3u >> master_playlist.m3u
          fi
          
          if [ -s tamil_movies.m3u ]; then
              echo "" >> master_playlist.m3u
              echo "# Tamil Movies & Series" >> master_playlist.m3u
              sed '/^#EXTM3U/d' tamil_movies.m3u >> master_playlist.m3u
          fi
          
          if [ -s tamil_subtitle_movies.m3u ]; then
              echo "" >> master_playlist.m3u
              echo "# Tamil Subtitle Movies" >> master_playlist.m3u
              sed '/^#EXTM3U/d' tamil_subtitle_movies.m3u >> master_playlist.m3u
          fi
          
          if [ -s kids_cartoon.m3u ]; then
              echo "" >> master_playlist.m3u
              echo "# Kids & Cartoon" >> master_playlist.m3u
              sed '/^#EXTM3U/d' kids_cartoon.m3u >> master_playlist.m3u
          fi
          
          if [ -s english_news.m3u ]; then
              echo "" >> master_playlist.m3u
              echo "# English News" >> master_playlist.m3u
              sed '/^#EXTM3U/d' english_news.m3u >> master_playlist.m3u
          fi
          
          if [ -s english_sports.m3u ]; then
              echo "" >> master_playlist.m3u
              echo "# English Sports" >> master_playlist.m3u
              sed '/^#EXTM3U/d' english_sports.m3u >> master_playlist.m3u
          fi
          
          if [ -s english_movies.m3u ]; then
              echo "" >> master_playlist.m3u
              echo "# English Movies" >> master_playlist.m3u
              sed '/^#EXTM3U/d' english_movies.m3u >> master_playlist.m3u
          fi
          
          dos2unix master_playlist.m3u master_epg.xml 2>/dev/null || true
          
          echo ""
          echo "=========================================="
          echo "📊 FINAL STATISTICS"
          echo "=========================================="
          TOTAL=$(grep -c '^#EXTINF:' master_playlist.m3u 2>/dev/null || echo 0)
          LOCAL=$(grep -c 'group-title="local channels"' master_playlist.m3u 2>/dev/null || echo 0)
          TAMIL_TV=$(grep -c 'group-title="tamil_tv"' master_playlist.m3u 2>/dev/null || echo 0)
          TAMIL_MOVIES=$(grep -c 'group-title="tamil_movies"' master_playlist.m3u 2>/dev/null || echo 0)
          ENGLISH=$(grep -c 'group-title="english' master_playlist.m3u 2>/dev/null || echo 0)
          KIDS=$(grep -c 'group-title="kids' master_playlist.m3u 2>/dev/null || echo 0)
          
          echo "🎉 Total channels: $TOTAL"
          echo "🎉 Local channels: $LOCAL"
          echo "🎉 Tamil TV: $TAMIL_TV"
          echo "🎉 Tamil Movies: $TAMIL_MOVIES"
          echo "🎉 English: $ENGLISH"
          echo "🎉 Kids: $KIDS"
          
          echo ""
          echo "=========================================="
          echo "✅ BUILD COMPLETE"
          echo "=========================================="
          
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add master_playlist.m3u master_epg.xml
          git diff --staged --quiet || git commit -m "Auto-sync: Categorized Tamil + English(news/sports/movies)"
          git push --force || true
